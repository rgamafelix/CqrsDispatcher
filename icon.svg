<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>
        <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>
        <linearGradient id="command" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#EF4444"/>
            <stop offset="100%" stop-color="#B91C1C"/>
        </linearGradient>
        <linearGradient id="query" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#047857"/>
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" rx="100" fill="url(#bg)"/>
    <rect width="480" height="480" x="16" y="16" rx="84" fill="none" stroke="#334155" stroke-width="4"/>

    <!-- Dispatcher Core (Center) -->
    <circle cx="256" cy="256" r="88" fill="url(#primary)" filter="url(#shadow)"/>
    <circle cx="256" cy="256" r="68" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-dasharray="16 8"
            opacity="0.8"/>
    <text x="256" y="270" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF"
          text-anchor="middle">CQRS
    </text>

    <!-- Command Flow (Red, Input) -->
    <g filter="url(#shadow)">
        <!-- Line -->
        <path d="M 64 200 L 150 200" stroke="url(#command)" stroke-width="24" stroke-linecap="round"/>
        <!-- Arrow Head -->
        <polygon points="150,170 190,200 150,230" fill="url(#command)"/>
        <text x="110" y="150" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FCA5A5"
              text-anchor="middle">Command
        </text>
    </g>

    <!-- Query Flow (Green, Output) -->
    <g filter="url(#shadow)">
        <!-- Line -->
        <path d="M 360 312 L 448 312" stroke="url(#query)" stroke-width="24" stroke-linecap="round"/>
        <!-- Arrow Head -->
        <polygon points="448,282 488,312 448,342" fill="url(#query)"/>
        <text x="404" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6EE7B7"
              text-anchor="middle">Query
        </text>
    </g>

    <!-- Small Nodes -->
    <circle cx="64" cy="200" r="12" fill="#FCA5A5"/>
    <circle cx="360" cy="312" r="12" fill="#6EE7B7"/>
</svg>
